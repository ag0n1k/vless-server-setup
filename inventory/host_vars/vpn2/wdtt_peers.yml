# подключаются через VK-TURN-туннель.
#
# Пример записи:
#   - name: myiphone
#     pubkey: <публичный ключ клиента>
#     allowed_ips:
#       - 10.66.66.10/32
#     persistent_keepalive: 25
#     state: present
#
# Чтобы добавить: ansible-playbook playbooks/add-wdtt-peer.yml -e name=<...> -e wg_ip=<...> -e vpn_server=vpn2

wdtt_peers: []
