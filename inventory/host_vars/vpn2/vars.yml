---
# Имя хоста для логов/комментариев в шаблонах.
inventory_hostname_label: vpn2

# Публичный endpoint, используемый клиентами OVPN/WG. По умолчанию равен ansible_host.
server_public_ip: "{{ ansible_host }}"

# Имя WAN-интерфейса. Если пусто — определится автоматически (роль common).
#wan_iface: eth0

# Public key WG-сервера (известно из `wg show wg0 public-key`).
# Используется только для выдачи новым WG-клиентам — НЕ как источник правды.
# Реальная истина — приватник в /etc/wireguard/server.key на сервере.
wg_server_pubkey: L+F3LDK6IKZyFcHG8o5cLbi4TuM+5Blr7dmzGs0C30k=

# Public key wg1-сервера (WDTT-туннель). Используется add-wdtt-peer.yml
# для генерации клиентских конфигов.
wdtt_wg_server_pub: 029Do1cME3DerDVIm1kU9/E1cNeSDBKwR/dZdqOnmg0=

# Self-check: на vpn2 каркас в синхроне с сервером, безопасно крутить
# периодическую проверку egress + tproxy инвариантов.
selfcheck_enabled: true

# Auto-recover: при 3 подряд egress-провалах self-check сам дёргает
# sb_recover.py и пробует следующие ноды.
selfcheck_auto_switch_enabled: true

# Telegram-нотификации о падающих юнитах (бот @remember_be_bot, тот же что
# и у psn-watch). Токен/chat_id — в vault_tg_token / vault_tg_chat_id.
# OnFailure повешан через drop-in'ы на список юнитов ниже — шаблоны
# самих юнитов не трогаем.
notify_enabled: true
notify_units:
  - openvpn-server@server.service
  - wg-quick@wg0.service
  - wg-quick@wg1.service
  - sing-box.service
  - sing-box-refresh.service
  - vk-turn-proxy.service
  - fail2ban.service
  - nftables.service
  - vpn-selfcheck.service
