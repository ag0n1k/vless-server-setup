---
# ──────────────────────────────────────────────────────────────────────
# Список OpenVPN-клиентов, для которых валидны сертификаты.
# Источник правды по PKI — это сам сервер (easy-rsa pki/issued/).
# Этот файл управляет:
#   • CCD-файлами (статический IP, iroute для site-to-site)
#   • Списком "ожидаемых" клиентов (для аудита: статус "присутствует/отозван")
#
# Чтобы добавить нового клиента: дописать запись и запустить
#   ansible-playbook ansible/playbooks/add-ovpn-client.yml -e cn=<name>
#
# Чтобы отозвать: state: revoked + запустить тот же playbook (он сделает
# easyrsa revoke + gen-crl + рестарт).
# ──────────────────────────────────────────────────────────────────────

ovpn_peers:
  - cn: hopper
    state: present
    fixed_ip: 10.88.0.12
    iroute:
      - 192.168.1.0/24
    note: "site-to-site router LAN1"

  - cn: giga
    state: present
    fixed_ip: 10.88.0.13
    iroute:
      - 192.168.2.0/24
    note: "site-to-site router LAN2"

  - cn: IphoneOlga
    state: present
    note: "dynamic IP, no iroute"

  - cn: IpadOlga
    state: present
    note: "dynamic IP"

  - cn: iphone
    state: present
    note: "dynamic IP"

  - cn: m5
    state: present
    note: "dynamic IP"

  - cn: client1
    state: present
    note: "первый клиент, выпущен из vpn.sh"
