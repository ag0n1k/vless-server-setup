---
- name: Каталог /etc/iproute2 (если ещё нет)
  ansible.builtin.file:
    path: "{{ tproxy_rt_tables | dirname }}"
    state: directory
    mode: "0755"

- name: Прописать routing-таблицу tproxy в /etc/iproute2/rt_tables
  ansible.builtin.lineinfile:
    path: "{{ tproxy_rt_tables }}"
    regexp: "^\\s*\\d+\\s+{{ tproxy_rt_table_name }}\\b"
    line: "{{ tproxy_rt_table_id }} {{ tproxy_rt_table_name }}"
    state: present
    create: true
    mode: "0644"

# ip rule fwmark + local route раньше ставились runtime-командами прямо
# отсюда — но они живут только в памяти ядра и пропадают при ребуте или
# передёргивании сети (именно так однажды отвалился tproxy: nft метил
# пакеты, а направить их в таблицу tproxy было нечем). Теперь единый
# источник правды — скрипт + oneshot-юнит, который восстанавливает их
# при буте и вместе с nftables.
- name: Скрипт persistence для tproxy policy-routing
  ansible.builtin.template:
    src: tproxy-routing.sh.j2
    dest: "{{ tproxy_routing_script }}"
    mode: "0755"
  notify: restart tproxy-routing

- name: Юнит tproxy-routing.service (ip rule + route при буте)
  ansible.builtin.template:
    src: tproxy-routing.service.j2
    dest: "/etc/systemd/system/{{ tproxy_routing_unit }}"
    mode: "0644"
  notify: restart tproxy-routing

- name: Включить и запустить tproxy-routing (ставит ip rule + route)
  ansible.builtin.systemd:
    name: "{{ tproxy_routing_unit }}"
    enabled: true
    state: started
    daemon_reload: true

- name: Найти старые TPROXY-таблицы (если остались с прошлой схемы)
  ansible.builtin.shell: |
    for t in vpnclients_tproxy vpnclients_guard wg_tproxy; do
      nft list table inet "$t" >/dev/null 2>&1 && echo "$t" || true
    done
  args:
    executable: /bin/bash
  register: _legacy_tables
  changed_when: false
  check_mode: false

- name: Снять старые TPROXY-таблицы
  ansible.builtin.command: nft delete table inet {{ item }}
  loop: "{{ _legacy_tables.stdout_lines | default([]) }}"
  changed_when: true

- name: Единая TPROXY-таблица для всех VPN-интерфейсов
  ansible.builtin.template:
    src: tproxy.nft.j2
    dest: "{{ tproxy_nft_path }}"
    mode: "0644"
  notify: reload nftables
