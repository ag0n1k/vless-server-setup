---
- name: Каталог /etc/iproute2 (если ещё нет)
  ansible.builtin.file:
    path: "{{ tproxy_rt_tables | dirname }}"
    state: directory
    mode: "0755"

- name: Прописать routing-таблицу tproxy в /etc/iproute2/rt_tables
  ansible.builtin.lineinfile:
    path: "{{ tproxy_rt_tables }}"
    regexp: "^\\s*\\d+\\s+{{ tproxy_rt_table_name }}\\b"
    line: "{{ tproxy_rt_table_id }} {{ tproxy_rt_table_name }}"
    state: present
    create: true
    mode: "0644"

- name: Посчитать ip rule fwmark
  ansible.builtin.shell: |
    set -o pipefail
    ip -4 rule show | grep -cE "fwmark 0x{{ '%x' | format(tproxy_fwmark) }} lookup {{ tproxy_rt_table_name }}" || true
  args:
    executable: /bin/bash
  register: _fwmark_count
  changed_when: false
  check_mode: false

- name: Восстановить единичное ip rule fwmark (при дубликатах/отсутствии)
  ansible.builtin.shell: |
    set -e
    while ip -4 rule show | grep -qE "fwmark 0x{{ '%x' | format(tproxy_fwmark) }} lookup {{ tproxy_rt_table_name }}"; do
      ip -4 rule del fwmark {{ tproxy_fwmark }} lookup {{ tproxy_rt_table_name }} || break
    done
    ip -4 rule add fwmark {{ tproxy_fwmark }} lookup {{ tproxy_rt_table_name }} pref 100
  when: (_fwmark_count.stdout | trim | int) != 1
  changed_when: true

- name: Проверить local default в таблице tproxy
  ansible.builtin.command: ip route show table {{ tproxy_rt_table_name }}
  register: _tproxy_route
  changed_when: false
  check_mode: false
  failed_when: false

- name: Добавить local default в таблицу tproxy (если отсутствует)
  ansible.builtin.shell: |
    set -e
    ip route flush table {{ tproxy_rt_table_name }} 2>/dev/null || true
    ip route add local 0.0.0.0/0 dev lo table {{ tproxy_rt_table_name }}
  when: _tproxy_route.stdout is not search('^local default dev lo')
  changed_when: true

- name: Найти старые TPROXY-таблицы (если остались с прошлой схемы)
  ansible.builtin.shell: |
    for t in vpnclients_tproxy vpnclients_guard wg_tproxy; do
      nft list table inet "$t" >/dev/null 2>&1 && echo "$t" || true
    done
  args:
    executable: /bin/bash
  register: _legacy_tables
  changed_when: false
  check_mode: false

- name: Снять старые TPROXY-таблицы
  ansible.builtin.command: nft delete table inet {{ item }}
  loop: "{{ _legacy_tables.stdout_lines | default([]) }}"
  changed_when: true

- name: Единая TPROXY-таблица для всех VPN-интерфейсов
  ansible.builtin.template:
    src: tproxy.nft.j2
    dest: "{{ tproxy_nft_path }}"
    mode: "0644"
  notify: reload nftables
