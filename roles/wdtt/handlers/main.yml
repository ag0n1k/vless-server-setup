---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart vk-turn-proxy
  ansible.builtin.systemd:
    name: vk-turn-proxy.service
    state: restarted
  # См. taska "Включить и запустить vk-turn-proxy" — в check-mode
  # юнит-файл ещё не создан физически.
  when: not ansible_check_mode

- name: reload wg1
  ansible.builtin.shell: |
    set -e
    wg syncconf {{ wdtt_wg_iface }} <(wg-quick strip {{ wdtt_wg_iface }})
  args:
    executable: /bin/bash

- name: reload nftables
  ansible.builtin.command: nft -f /etc/nftables.conf
