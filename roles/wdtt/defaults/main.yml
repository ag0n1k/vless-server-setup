---
# ──────────────────────────────────────────────────────────────────────
# Архитектура (upstream cacggghp/vk-turn-proxy v1.8.x):
#
#   [VK TURN]──DTLS──> 0.0.0.0:56000 (vk-turn-proxy server)
#                         │
#                         ▼ UDP 127.0.0.1:51821
#                      [wg1 интерфейс на vpn1]
#                         │
#                         ▼ tproxy → sing-box → vpnd.io
#
# Никаких master-паролей: аутентификация — VK TURN-creds на стороне
# клиента (выводятся из ссылки на групповой VK-звонок). Сервер просто
# распаковывает DTLS и форвардит UDP в локальный WG.
# ──────────────────────────────────────────────────────────────────────

# Источник бинаря — три варианта (по убыванию приоритета):
#   1) wdtt_server_local_path — сюда `make build-wdtt` качает release
#   2) wdtt_server_binary_url — скачать с http(s)
#   3) ничего не задано → роль валится pre-flight'ом
wdtt_release_version: "v1.8.3"
wdtt_server_local_path: "{{ playbook_dir }}/../.local/vk-turn-proxy"
wdtt_server_binary_url: "https://github.com/cacggghp/vk-turn-proxy/releases/download/{{ wdtt_release_version }}/server-linux-amd64"
wdtt_server_binary_sha256: ""     # опционально; заполни sha256 для checksum-проверки

# Server-side
vkturn_install_dir: /usr/local/bin
vkturn_server_bin: /usr/local/bin/vk-turn-proxy
vkturn_log_dir: /var/log/vk-turn-proxy
vkturn_listen: "0.0.0.0:{{ wdtt_external_port }}"
vkturn_external_port: 56000

# Внутренний WG (отдельный от существующего wg0). vpn1 будет иметь
# два WG-интерфейса:
#   wg0  → 10.188.0.0/24, listen 51820, site-to-site (giga, hopper)
#   wg1  → 10.66.66.0/24, listen 51821 (только локально), для VK-туннеля
# vk-turn-proxy подключается на 127.0.0.1:51821.
wdtt_wg_iface: wg1
wdtt_wg_port: 51821
wdtt_wg_subnet: 10.66.66.0/24
wdtt_wg_server_addr: 10.66.66.1/24
wdtt_wg_server_priv_path: /etc/wireguard/wg1.key
wdtt_wg_server_pub_path: /etc/wireguard/wg1.key.pub

# Внешний DTLS-эндпойнт (сюда подключаются клиенты через VK TURN)
wdtt_external_port: 56000
