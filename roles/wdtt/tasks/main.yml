---
# ──────────────────────────────────────────────────────────────────────
# WDTT (cacggghp/vk-turn-proxy):
#   • второй WG-интерфейс wg1 на :51821 (localhost-only через nft-drop)
#   • vk-turn-proxy server :56000 (DTLS) → 127.0.0.1:51821
#   • nft-фильтр на входящий :56000 — только из VK CDN-сетей
#   • TPROXY (через roles/tproxy) перехватывает трафик с wg1 в sing-box
# ──────────────────────────────────────────────────────────────────────

- name: Pre-flight — проверить источник бинаря
  ansible.builtin.assert:
    that:
      - (wdtt_server_local_path | length > 0 and wdtt_server_local_path is exists)
        or (wdtt_server_binary_url | length > 0)
    fail_msg: |
      Нет источника vk-turn-proxy. Варианты:
        1) make build-wdtt   — скачает release-бинарь в .local/vk-turn-proxy
        2) задать wdtt_server_binary_url в group_vars/all/vars.yml

- name: Установить wireguard-tools
  ansible.builtin.apt:
    name: wireguard-tools
    state: present
  tags: [apt]

- name: Каталог логов vk-turn-proxy
  ansible.builtin.file:
    path: "{{ vkturn_log_dir }}"
    state: directory
    mode: "0755"
    owner: nobody
    group: nogroup

- name: Каталог /etc/wireguard
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    mode: "0700"

# ── Второй WG-инстанс wg1 для туннеля ────────────────────────────────
- name: Сгенерировать wg1 priv/pub (только если ещё нет)
  ansible.builtin.shell: |
    set -e
    umask 077
    wg genkey > {{ wdtt_wg_server_priv_path }}
    wg pubkey < {{ wdtt_wg_server_priv_path }} > {{ wdtt_wg_server_pub_path }}
  args:
    creates: "{{ wdtt_wg_server_priv_path }}"
  # Идемпотентно через creates:, безопасно запускать и в --check —
  # иначе следующий slurp упадёт на отсутствующем файле.
  check_mode: false

- name: Прочитать wg1 priv key
  ansible.builtin.slurp:
    src: "{{ wdtt_wg_server_priv_path }}"
  register: _wg1_priv_b64
  no_log: true

- name: Прочитать wg1 pub key
  ansible.builtin.slurp:
    src: "{{ wdtt_wg_server_pub_path }}"
  register: _wg1_pub_b64

- name: Сохранить ключи как факты
  ansible.builtin.set_fact:
    wdtt_wg_server_priv: "{{ _wg1_priv_b64.content | b64decode | trim }}"
    wdtt_wg_server_pub: "{{ _wg1_pub_b64.content | b64decode | trim }}"
  no_log: true

- name: Загрузить state/wdtt_peers.yml
  ansible.builtin.include_vars:
    file: "{{ playbook_dir }}/../state/wdtt_peers.yml"

- name: Прочитать PSK мап из vault
  ansible.builtin.set_fact:
    _wdtt_psk_map: "{{ vault_wdtt_peer_psks | default({}) }}"
  no_log: true

- name: Сгенерировать /etc/wireguard/wg1.conf
  ansible.builtin.template:
    src: wg1.conf.j2
    dest: /etc/wireguard/wg1.conf
    mode: "0600"
    backup: true
  notify: reload wg1

- name: Включить wg-quick@wg1
  ansible.builtin.systemd:
    name: "wg-quick@{{ wdtt_wg_iface }}.service"
    enabled: true
    state: started

- name: rp_filter=0 на {{ wdtt_wg_iface }} (после поднятия — нужен для TPROXY)
  ansible.posix.sysctl:
    name: "net.ipv4.conf.{{ wdtt_wg_iface }}.rp_filter"
    value: "0"
    sysctl_file: /etc/sysctl.d/99-vpn-gateway.conf
    state: present
    reload: true

# ── vk-turn-proxy сервер ─────────────────────────────────────────────
- name: Залить vk-turn-proxy из локально скачанного бинаря
  when: wdtt_server_local_path | length > 0 and wdtt_server_local_path is exists
  ansible.builtin.copy:
    src: "{{ wdtt_server_local_path }}"
    dest: "{{ vkturn_server_bin }}"
    mode: "0755"
    owner: root
    group: root
  notify: restart vk-turn-proxy

- name: Скачать vk-turn-proxy по URL (fallback)
  when:
    - wdtt_server_binary_url | length > 0
    - not (wdtt_server_local_path | length > 0 and wdtt_server_local_path is exists)
  ansible.builtin.get_url:
    url: "{{ wdtt_server_binary_url }}"
    dest: "{{ vkturn_server_bin }}"
    mode: "0755"
    checksum: "{{ ('sha256:' + wdtt_server_binary_sha256) if wdtt_server_binary_sha256 | length > 0 else omit }}"
  notify: restart vk-turn-proxy

- name: systemd-юнит vk-turn-proxy
  ansible.builtin.template:
    src: vk-turn-proxy.service.j2
    dest: /etc/systemd/system/vk-turn-proxy.service
    mode: "0644"
  notify:
    - reload systemd
    - restart vk-turn-proxy

- name: nftables — leak-фильтр и закрытие 51821 снаружи
  ansible.builtin.copy:
    dest: /etc/nftables.d/wdtt.nft
    mode: "0644"
    content: |
      # Дропаем входящие udp/56000 от не-VK сетей (защита от open-internet
      # сканов). Подсети VK CDN — best-effort, обновлять раз в полгода.
      table inet wdtt_input {
        set vk_cdn_v4 {
          type ipv4_addr
          flags interval
          elements = {
            87.240.0.0/16,
            93.186.224.0/20,
            95.163.0.0/16,
            185.29.130.0/24,
            185.32.248.0/22,
            217.20.144.0/20
          }
        }
        chain input {
          type filter hook input priority filter; policy accept;

          # 56000/udp — только от VK CDN
          iifname "{{ wan_iface }}" udp dport {{ wdtt_external_port }} \
            ip saddr != @vk_cdn_v4 drop

          # 51821/udp — внутренний WG, снаружи закрыт.
          # vk-turn-proxy ходит к нему через 127.0.0.1, лоопбэк не блокируем.
          iifname "{{ wan_iface }}" udp dport {{ wdtt_wg_port }} drop
        }
      }
  notify: reload nftables

- name: Включить и запустить vk-turn-proxy
  ansible.builtin.systemd:
    name: vk-turn-proxy.service
    enabled: true
    state: started
    daemon_reload: true
  # В --check шаблон выше не создаёт юнит физически, и systemd не
  # находит сервис → падает с "Could not find the requested service".
  # В реальном apply таска отработает корректно.
  when: not ansible_check_mode
