---
# ──────────────────────────────────────────────────────────────────────
# WDTT-сервер: DTLS на 56000/udp + внутренний WG wdtt0 (10.66.66.0/24).
# Бинарь либо из wdtt_server_local_path (приоритет), либо скачивается
# по wdtt_server_binary_url. Сборка локально: `make build-wdtt`.
# ──────────────────────────────────────────────────────────────────────

- name: Pre-flight — проверить источник бинаря
  ansible.builtin.assert:
    that:
      - (wdtt_server_local_path | length > 0 and wdtt_server_local_path is exists)
        or (wdtt_server_binary_url | length > 0)
    fail_msg: |
      Нет источника wdtt-server. Варианты:
        1) make build-wdtt   — соберёт локально в .local/wdtt-server
        2) задать wdtt_server_binary_url в group_vars/all/vars.yml,
           если бинарь хостится где-то снаружи.

- name: Pre-flight — проверить master-пароль в vault
  ansible.builtin.assert:
    that:
      - vault_wdtt_master_password is defined
      - vault_wdtt_master_password | length >= 16
    fail_msg: |
      vault_wdtt_master_password отсутствует или короче 16 символов.
      Сгенерировать: openssl rand -base64 24
      Положить в ansible/group_vars/all/vault.yml.

- name: Установить wireguard-tools (для интерфейса wdtt0)
  ansible.builtin.apt:
    name: wireguard-tools
    state: present

- name: Каталоги для wdtt
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - "{{ wdtt_state_dir }}"
    - "{{ wdtt_log_dir }}"

- name: Залить wdtt-server из локально собранного бинаря
  when: wdtt_server_local_path | length > 0 and wdtt_server_local_path is exists
  ansible.builtin.copy:
    src: "{{ wdtt_server_local_path }}"
    dest: "{{ wdtt_server_bin }}"
    mode: "0755"
    owner: root
    group: root
  notify: restart wdtt-server

- name: Скачать wdtt-server по URL (fallback)
  when:
    - wdtt_server_binary_url | length > 0
    - not (wdtt_server_local_path | length > 0 and wdtt_server_local_path is exists)
  ansible.builtin.get_url:
    url: "{{ wdtt_server_binary_url }}"
    dest: "{{ wdtt_server_bin }}"
    mode: "0755"
    checksum: "{{ ('sha256:' + wdtt_server_binary_sha256) if wdtt_server_binary_sha256 | length > 0 else omit }}"
  notify: restart wdtt-server

- name: Положить master-пароль (только root)
  ansible.builtin.copy:
    dest: "{{ wdtt_state_dir }}/master.password"
    content: "{{ vault_wdtt_master_password }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart wdtt-server

- name: systemd-юнит wdtt-server
  ansible.builtin.template:
    src: wdtt-server.service.j2
    dest: /etc/systemd/system/wdtt-server.service
    mode: "0644"
  notify:
    - reload systemd
    - restart wdtt-server

- name: nftables — leak-фильтр на входящий 56000/udp (только VK CDN)
  ansible.builtin.copy:
    dest: /etc/nftables.d/wdtt.nft
    mode: "0644"
    content: |
      # MASQUERADE для wdtt0 не нужен: трафик идёт через TPROXY → sing-box.
      # Если когда-нибудь понадобится прямой выход с wdtt0 (минуя sing-box):
      #   table ip wdtt_nat { chain postrouting {
      #     type nat hook postrouting priority 100; policy accept;
      #     oifname "{{ wan_iface }}" ip saddr {{ wdtt_subnet }} masquerade
      #   } }

      # Дроп всех входящих 56000/udp от не-VK адресов.
      # Подсети VK CDN — best-effort из wdtt-analysis.md, обновлять раз
      # в полгода (vk_cdn_v4 set ниже).
      table inet wdtt_input {
        set vk_cdn_v4 {
          type ipv4_addr
          flags interval
          elements = {
            87.240.0.0/16,
            93.186.224.0/20,
            95.163.0.0/16,
            185.29.130.0/24,
            185.32.248.0/22,
            217.20.144.0/20
          }
        }
        chain input {
          type filter hook input priority filter; policy accept;
          iifname "{{ wan_iface }}" udp dport {{ wdtt_external_port }} \
            ip saddr != @vk_cdn_v4 drop
        }
      }
  notify: reload nftables

- name: Включить и запустить wdtt-server
  ansible.builtin.systemd:
    name: wdtt-server.service
    enabled: true
    state: started
    daemon_reload: true
