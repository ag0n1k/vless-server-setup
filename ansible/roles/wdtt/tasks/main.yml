---
# ──────────────────────────────────────────────────────────────────────
# WDTT-сервер.
# Pre-flight: переменная wdtt_server_binary_url должна быть заполнена,
# иначе роль падает с понятной ошибкой (нечего ставить).
# ──────────────────────────────────────────────────────────────────────

- name: Pre-flight — проверить что URL бинаря задан
  ansible.builtin.assert:
    that:
      - wdtt_server_binary_url is defined
      - wdtt_server_binary_url | length > 0
    fail_msg: |
      В group_vars не задан wdtt_server_binary_url.
      Ситуация: amurcanov не публикует готовый wdtt-server-linux-amd64
      в Releases, придётся собрать самому из server.go:
        git clone https://github.com/amurcanov/proxy-turn-vk-android
        cd proxy-turn-vk-android/server
        go build -o wdtt-server
      Бинарь залить куда-то (S3/GH-Release собственный/scp), URL —
      в group_vars/all/vars.yml как wdtt_server_binary_url.

- name: Pre-flight — проверить что master-пароль задан в vault
  ansible.builtin.assert:
    that:
      - vault_wdtt_master_password is defined
      - vault_wdtt_master_password | length >= 16
    fail_msg: |
      В group_vars/all/vault.yml должен быть vault_wdtt_master_password
      (минимум 16 символов). Сгенерировать:
        openssl rand -base64 24

- name: Установить wireguard-tools (для интерфейса wdtt0)
  ansible.builtin.apt:
    name: wireguard-tools
    state: present

- name: Каталоги для wdtt
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop:
    - "{{ wdtt_state_dir }}"
    - "{{ wdtt_log_dir }}"

- name: Скачать wdtt-server бинарь
  ansible.builtin.get_url:
    url: "{{ wdtt_server_binary_url }}"
    dest: "{{ wdtt_server_bin }}"
    mode: "0755"
    checksum: "{{ ('sha256:' + wdtt_server_binary_sha256) if wdtt_server_binary_sha256 | length > 0 else omit }}"
  notify: restart wdtt-server

- name: Положить master-пароль (только root)
  ansible.builtin.copy:
    dest: "{{ wdtt_state_dir }}/master.password"
    content: "{{ vault_wdtt_master_password }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart wdtt-server

# ──────────────────────────────────────────────────────────────────────
# wdtt-server сам поднимает интерфейс wdtt0 как WG-аналог. Снаружи он
# виден как обычный wireguard-интерфейс с listen 56001/udp на 127.0.0.1
# (или 0.0.0.0 — зависит от конфигурации). Мы НЕ настраиваем wdtt0
# через wg-quick, потому что wdtt-server сам этим занимается.
# ──────────────────────────────────────────────────────────────────────

- name: systemd-юнит wdtt-server
  ansible.builtin.template:
    src: wdtt-server.service.j2
    dest: /etc/systemd/system/wdtt-server.service
    mode: "0644"
  notify:
    - reload systemd
    - restart wdtt-server

- name: nftables — NAT и forward для wdtt0
  ansible.builtin.copy:
    dest: /etc/nftables.d/wdtt.nft
    mode: "0644"
    content: |
      # MASQUERADE НЕ нужен: трафик с wdtt0 идёт через TPROXY → sing-box,
      # а sing-box уже проксирует через свой outbound. Если когда-нибудь
      # понадобится прямой выход с wdtt0 (минуя sing-box) — добавь:
      #   table ip wdtt_nat { chain postrouting {
      #     type nat hook postrouting priority 100; policy accept;
      #     oifname "{{ wan_iface }}" ip saddr {{ wdtt_subnet }} masquerade
      #   } }

      # Разрешаем входящий DTLS на 56000/udp с WAN.
      # ВАЖНО: пропускаем ТОЛЬКО трафик с VK CDN-сетей, чтобы wdtt-server
      # не светился наружу как открытый порт. Перечень — best-effort из
      # wdtt-analysis.md, актуализировать раз в полгода.
      table inet wdtt_input {
        set vk_cdn_v4 {
          type ipv4_addr
          flags interval
          elements = {
            87.240.0.0/16,
            93.186.224.0/20,
            95.163.0.0/16,
            185.29.130.0/24,
            185.32.248.0/22,
            217.20.144.0/20
          }
        }
        chain input {
          type filter hook input priority filter; policy accept;
          # сначала reject от не-VK адресов
          iifname "{{ wan_iface }}" udp dport {{ wdtt_external_port }} \
            ip saddr != @vk_cdn_v4 drop
        }
      }
  notify: reload nftables

- name: Включить и запустить wdtt-server
  ansible.builtin.systemd:
    name: wdtt-server.service
    enabled: true
    state: started
    daemon_reload: true
