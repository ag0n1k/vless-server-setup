---
# ──────────────────────────────────────────────────────────────────────
# WDTT-сервер: DTLS-эндпойнт (UDP/56000) + внутренний WG (UDP/56001) на
# интерфейсе wdtt0 (10.66.66.0/24).
#
# Версия 1.0.6/1.1.0 (WG + DTLS, под VK-call камуфляж) — рекомендуется
# для жёстких белых списков. Версия 1.1.4 уже SOCKS5+KCP, без DTLS-
# камуфляжа, для жёсткого белого списка по IP VK она не подходит,
# поэтому фиксируем 1.1.0.
# ──────────────────────────────────────────────────────────────────────

# Релиз — TODO: перед apply проверить актуальный URL/версию на
#   https://github.com/amurcanov/proxy-turn-vk-android/releases
# и собрать сервер из исходников (server.go) либо взять готовый бинарь
# из релиза. Поле wdtt_server_binary_url сейчас пустое — apply упадёт
# на проверке, пока его не заполнишь.
wdtt_version: "1.1.0"
wdtt_server_binary_url: ""        # https://github.com/amurcanov/.../releases/download/v1.1.0/wdtt-server-linux-amd64
wdtt_server_binary_sha256: ""     # sha256 для проверки

wdtt_install_dir: /usr/local/bin
wdtt_server_bin: /usr/local/bin/wdtt-server
wdtt_state_dir: /var/lib/wdtt
wdtt_log_dir: /var/log/wdtt

# Внешний DTLS endpoint
wdtt_external_port: 56000

# Внутренний WG (между wdtt-server и wdtt0)
wdtt_internal_port: 56001
wdtt_iface: wdtt0
wdtt_subnet: 10.66.66.0/24
wdtt_server_addr: 10.66.66.1/24

# Пароли:
#  - wdtt_master_password = vault_wdtt_master_password (главный, из vault)
#  - per-client passwords  = vault_wdtt_client_passwords (map cn → password)
# Список клиентов и их состояний — в state/wdtt_clients.yml.

# Флаги для wdtt-server (TODO: уточнить из --help бинаря после первого apply).
# Документация автора скудная, поэтому ниже — best-guess по wdtt-analysis.md.
wdtt_server_args: >-
  -listen 0.0.0.0:{{ wdtt_external_port }}
  -wg-port {{ wdtt_internal_port }}
  -wg-iface {{ wdtt_iface }}
  -wg-subnet {{ wdtt_subnet }}
  -password-file {{ wdtt_state_dir }}/master.password
