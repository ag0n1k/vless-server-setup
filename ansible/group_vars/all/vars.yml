---
# ──────────────────────────────────────────────────────────────────────
# Открытые параметры стенда. Все секреты — в vault.yml (см. vault.yml.example).
# ──────────────────────────────────────────────────────────────────────

# OpenVPN ────────────────────────────────────────────────────────────
openvpn_port: 1194
openvpn_proto: udp
openvpn_subnet_cidr: 10.88.0.0/24
openvpn_subnet_addr: 10.88.0.0
openvpn_subnet_mask: 255.255.255.0
openvpn_dns:
  - 1.1.1.1
  - 8.8.8.8
openvpn_client_to_client: true
openvpn_cipher: AES-256-GCM
openvpn_data_ciphers: AES-256-GCM:AES-128-GCM:CHACHA20-POLY1305
openvpn_auth_digest: SHA256
openvpn_keepalive: "10 120"

# WireGuard ──────────────────────────────────────────────────────────
wg_interface: wg0
wg_port: 51820
wg_subnet: 10.188.0.0/24
wg_server_addr: 10.188.0.1/24

# sing-box ───────────────────────────────────────────────────────────
singbox_socks_port: 1080
singbox_tproxy_port: 7895
singbox_log_level: info
# Источник субскрипции хранится в vault: subscription_urls.

# TPROXY ─────────────────────────────────────────────────────────────
# Интерфейсы, чьи пакеты заворачиваются в sing-box (входящие).
# tun0 — OVPN, wg0 — обычный WG, wdtt0 — WDTT-туннель через VK TURN.
# Все три в одну nft-таблицу, без дублей.
tproxy_capture_ifaces:
  - tun0
  - wg0
  - wdtt0
tproxy_fwmark: 1
tproxy_rt_table_id: 100
tproxy_rt_table_name: tproxy

# fail2ban ───────────────────────────────────────────────────────────
f2b_ssh_maxretry: 2
f2b_ssh_findtime: 10m
f2b_ssh_bantime: 72h
f2b_ovpn_maxretry: 6
f2b_ovpn_findtime: 10m
f2b_ovpn_bantime: 6h
f2b_ovpn_logpath: /var/log/openvpn/openvpn.log

# WDTT ───────────────────────────────────────────────────────────────
# Включается отдельным флагом — роль не запускается по умолчанию,
# потому что требует отдельного бинаря и заполненного vault'а.
# enable_wdtt: true — в host_vars или из CLI: -e enable_wdtt=true
enable_wdtt: false

# Common ─────────────────────────────────────────────────────────────
sysctl_extras:
  net.ipv4.ip_forward: 1
  net.ipv6.conf.all.forwarding: 1
  net.ipv4.conf.all.rp_filter: 0
