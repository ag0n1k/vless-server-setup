---
# ──────────────────────────────────────────────────────────────────────
# WG-пиры на интерфейсе wg1 (10.66.66.0/24). Каждый пир — это устройство
# (iPhone, Mac, Android), которое подключается через vk-turn-proxy
# клиент с маскировкой под VK-звонок.
#
# Структура идентична state/wg_peers.yml.
# Pubkey'и публичные. PSK (опционально) — в vault как
# vault_wdtt_peer_psks: { "<pubkey>": "<psk>" }.
#
# Чтобы добавить устройство: ansible-playbook playbooks/add-wdtt-peer.yml
# (генерирует ключи локально, печатает pubkey/PSK для добавления сюда).
# ──────────────────────────────────────────────────────────────────────

wdtt_peers: []
  # Пример:
  # - name: myiphone
  #   pubkey: <publickey-из-add-wdtt-peer>
  #   allowed_ips:
  #     - 10.66.66.10/32
  #   persistent_keepalive: 25
  #   state: present
  #   note: "iPhone основной"
