---
# ──────────────────────────────────────────────────────────────────────
# WDTT-клиенты. Per-client пароли — в vault.yml как
#   vault_wdtt_client_passwords:
#     myiphone: "<длинный_пароль>"
#     mymac:    "<другой_длинный_пароль>"
#
# Этот файл — публичная часть: имена клиентов + комментарии.
# При state: revoked — пароль удаляется из мастер-списка на сервере
# при следующем apply.
#
# Если используется только мастер-пароль (без per-client) — можно
# оставить пустой список и подключаться всеми устройствами под одним
# vault_wdtt_master_password.
# ──────────────────────────────────────────────────────────────────────

wdtt_clients: []
  # Пример:
  # - cn: myiphone
  #   state: present
  #   note: "iPhone основной"
  # - cn: mymac
  #   state: present
  #   note: "MacBook рабочий"
