---
# Добавить нового OpenVPN-клиента: подпись серта на сервере + сборка .ovpn локально.
# Вызов:
#   ansible-playbook add-ovpn-client.yml -e cn=newuser
#   ansible-playbook add-ovpn-client.yml -e cn=router3 -e fixed_ip=10.88.0.20 -e iroute=192.168.3.0/24

- name: Add OpenVPN client
  hosts: "{{ target | default('all') }}"
  become: true
  gather_facts: true
  vars:
    cn: ""
    fixed_ip: ""
    iroute: ""
    ovpn_easyrsa_dir: /etc/openvpn/easy-rsa
    ovpn_keys_dir: /etc/openvpn/server/keys
    ovpn_clients_out_dir: /root/ovpn-clients

  pre_tasks:
    - name: Валидация имени
      ansible.builtin.assert:
        that:
          - cn | length > 0
          - cn is match("^[A-Za-z0-9._-]{1,64}$")
        fail_msg: "Передай -e cn=<name>, имя должно быть [A-Za-z0-9._-]{1,64}"

  tasks:
    - name: Клиент уже существует?
      ansible.builtin.stat:
        path: "{{ ovpn_easyrsa_dir }}/pki/issued/{{ cn }}.crt"
      register: _crt

    - name: Подпись клиентского серта
      ansible.builtin.command: ./easyrsa --batch build-client-full {{ cn }} nopass
      args:
        chdir: "{{ ovpn_easyrsa_dir }}"
      when: not _crt.stat.exists

    - name: Прочитать ca.crt, client.crt, client.key, ta.key
      ansible.builtin.slurp: { src: "{{ item }}" }
      register: _slurped
      loop:
        - "{{ ovpn_keys_dir }}/ca.crt"
        - "{{ ovpn_easyrsa_dir }}/pki/issued/{{ cn }}.crt"
        - "{{ ovpn_easyrsa_dir }}/pki/private/{{ cn }}.key"
        - "{{ ovpn_keys_dir }}/ta.key"
      no_log: true

    - name: Извлечь содержимое
      ansible.builtin.set_fact:
        ca_crt:     "{{ _slurped.results[0].content | b64decode }}"
        client_crt: "{{ _slurped.results[1].content | b64decode }}"
        client_key: "{{ _slurped.results[2].content | b64decode }}"
        ta_key:     "{{ _slurped.results[3].content | b64decode }}"
      no_log: true

    - name: Каталог для .ovpn
      ansible.builtin.file:
        path: "{{ ovpn_clients_out_dir }}"
        state: directory
        mode: "0700"

    - name: Сгенерировать {{ cn }}.ovpn
      ansible.builtin.template:
        src: ../roles/openvpn/templates/client.ovpn.j2
        dest: "{{ ovpn_clients_out_dir }}/{{ cn }}.ovpn"
        mode: "0600"
      no_log: true

    - name: Скопировать .ovpn локально
      ansible.builtin.fetch:
        src: "{{ ovpn_clients_out_dir }}/{{ cn }}.ovpn"
        dest: "{{ playbook_dir }}/../../.local-clients/"
        flat: false

    - name: CCD (опционально)
      ansible.builtin.copy:
        dest: "/etc/openvpn/ccd/{{ cn }}"
        mode: "0644"
        content: |
          {% if fixed_ip | length > 0 %}ifconfig-push {{ fixed_ip }} 255.255.255.0
          {% endif %}{% if iroute | length > 0 %}{% set p = iroute.split('/') %}iroute {{ p[0] }} 255.255.255.0
          {% endif %}
      when: fixed_ip | length > 0 or iroute | length > 0

    - name: Напоминание добавить в state
      ansible.builtin.debug:
        msg:
          - "Готово. Файл клиента: {{ ovpn_clients_out_dir }}/{{ cn }}.ovpn"
          - "Не забудь добавить запись в ansible/state/ovpn_peers.yml и закоммитить."
