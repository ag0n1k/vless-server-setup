---
- name: Configure VPN gateway (OpenVPN + WireGuard + sing-box + TPROXY)
  hosts: "{{ target | default('all') }}"
  become: true
  gather_facts: true

  # ovpn_peers, wg_peers, wdtt_peers подтягиваются автоматически из
  # inventory/host_vars/<host>/{ovpn,wg,wdtt}_peers.yml — Ansible сам
  # загружает host_vars при gather_facts.

  pre_tasks:
    - name: Определить WAN-интерфейс если не задан
      ansible.builtin.shell: ip route show default 0.0.0.0/0 | awk '{print $5; exit}'
      register: wan_detect
      changed_when: false
      when: wan_iface is not defined or wan_iface | length == 0
      tags: [always]

    - name: Зафиксировать wan_iface
      ansible.builtin.set_fact:
        wan_iface: "{{ wan_iface | default(wan_detect.stdout, true) }}"
      tags: [always]

  roles:
    - role: common
      tags: [common]
    - role: fail2ban
      tags: [fail2ban]
    - role: openvpn
      tags: [openvpn]
    - role: wireguard
      tags: [wireguard]
    - role: wdtt
      tags: [wdtt]
      when: enable_wdtt | default(true) | bool
    - role: singbox
      tags: [singbox]
    - role: tproxy
      tags: [tproxy]
